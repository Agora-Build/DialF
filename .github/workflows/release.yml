# Tag-driven release: push vX.Y.Z -> build prebuilt dialf binaries (ten-vad compiled from
# source, onnxruntime + model bundled + rpath fixed), publish a GitHub Release, the npm
# wrapper, and mirror to Cloudflare R2 (dl.agora.build).
#
# dialf/dialfd ARE shipped as prebuilt binaries; ten-vad inside them is always compiled
# from source (ONNX path). Linux aarch64 is cross-compiled on the x86_64 runner.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  ORT_VERSION: "1.17.1"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: darwin-aarch64
            ort_plat: osx-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: darwin-x86_64
            ort_plat: osx-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x86_64
            ort_plat: linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: linux-aarch64
            ort_plat: linux-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          perl -0pi -e "s/^version = \"[^\"]+\"/version = \"$VERSION\"/m" server/Cargo.toml || true

      - name: Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y patchelf
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          fi

      - name: Build (ten-vad from source; auto-downloads onnxruntime for the target)
        working-directory: server
        env:
          # Cross-compile linux-aarch64 on the x86_64 runner (no-op for other targets).
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage + bundle onnxruntime + model + fix rpath
        shell: bash
        run: |
          stage="dialf-${VERSION}-${{ matrix.artifact }}"
          ortlib="$HOME/.cargo/ten-vad-ort/${ORT_VERSION}/onnxruntime-${{ matrix.ort_plat }}-${ORT_VERSION}/lib"
          mkdir -p "$stage"
          cp "server/target/${{ matrix.target }}/release/dialf" "$stage/dialf"
          cp third_party/ten-vad/src/onnx_model/ten-vad.onnx "$stage/ten-vad.onnx"
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            aarch64-linux-gnu-strip "$stage/dialf" || true
          else
            strip "$stage/dialf" || true
          fi
          if [ "${{ runner.os }}" = "macOS" ]; then
            cp -a "$ortlib"/libonnxruntime*.dylib "$stage/"
            install_name_tool -add_rpath @loader_path "$stage/dialf"
          else
            cp -a "$ortlib"/libonnxruntime.so* "$stage/"
            patchelf --set-rpath '$ORIGIN' "$stage/dialf"
          fi
          tar -czf "${stage}.tar.gz" "$stage"
          echo "staged ${stage}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: dialf-${{ matrix.artifact }}
          path: dialf-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/dialf-*.tar.gz

  npm:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Set npm version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const f='npm/package.json',p=require('./'+f);p.version='$VERSION';require('fs').writeFileSync(f,JSON.stringify(p,null,2)+'\n')"
      - name: Publish
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  r2-mirror:
    name: Mirror to Cloudflare R2 (dl.agora.build)
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Upload tarballs + install script to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          npm i -g wrangler
          VERSION="${GITHUB_REF_NAME}"
          # Shared releases bucket for all Agora-Build CLIs; dl.agora.build fronts it.
          # Per-project key prefix (dialf/…) keeps projects separate.
          BUCKET="agora-build-releases"

          # Mirror each platform tarball
          for f in dist/dialf-*.tar.gz; do
            KEY="dialf/releases/${VERSION}/$(basename "$f")"
            echo "Uploading $KEY"
            wrangler r2 object put "$BUCKET/$KEY" --file="$f" --remote
          done

          # 'latest' version marker (plain text, no 'v' prefix)
          echo -n "${VERSION#v}" | wrangler r2 object put "$BUCKET/dialf/releases/latest" \
            --pipe --content-type text/plain --remote

          # install script -> https://dl.agora.build/dialf/install.sh
          wrangler r2 object put "$BUCKET/dialf/install.sh" \
            --file=scripts/install.sh --content-type text/plain --remote
