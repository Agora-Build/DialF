# DialF — inbound auto-answer job.
#
# Use this with auto-answer, two ways:
#   • Persistent (config.yaml):
#       autoanswer:
#         "+15551234": jobs/inbound-call.yaml
#   • Ad-hoc, no config edit (foreground; reverts on Ctrl-C):
#       dialf run server/jobs/inbound-call.yaml --autoanswer +15551234,+15559876
#
# In auto-answer mode the daemon answers the inbound call for you, so the job is just the
# conversation — no call.answer needed. (call.dial / call.wait_answered / call.answer are
# ignored with a warning if present, so a job can be shared with outbound use.) Prompts play
# out the sound card into the call; audio.wait_for_speech captures the caller until they stop
# talking (ten-vad). Audio is bridged through the host's USB sound card (see config audio.*);
# if `audio.record_dir` is set, the whole call is recorded to dialf-job-<ts>-rx/tx/mix.wav.

- type: audio.play
  file: ../../samples/prompt-en-1.wav
  description: greeting

- type: audio.wait_for_speech
  end_timeout_ms: 45000
  silence_duration_ms: 3000
  description: let the caller respond

- type: audio.play
  file: ../../samples/prompt-en-2.wav
  description: closing

- type: wait
  ms: 800
  description: let the closing audio finish playing out the card

- type: call.hangup
  description: end the call

- type: log
  message: inbound call complete
