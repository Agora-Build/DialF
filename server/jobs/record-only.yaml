# DialF — record-only: capture the sound card. No call is placed or answered.
#
# Source-agnostic: it records whatever audio is on the card, from ANY app — a call in
# any dialer (DialF *or* the stock Phone app), a media player, a meeting, etc. DialF
# isn't driving the call here, only recording the bridge. With audio.record_dir set it
# writes <job>-rx.wav (card input), <job>-tx.wav (what this job plays) and <job>-mix.wav.
#
#   dialf run jobs/record-only.yaml --device <device>
#
# `--device` is only the job target for `dialf run` to resolve (a phone must be connected),
# but the audio steps use the sound card, not the phone — no call is involved.

- type: audio.play
  file: ../../samples/prompt-en-1.wav
  description: play a prompt out the sound card (recorded as tx)

- type: audio.wait_for_speech
  end_timeout_ms: 10000
  silence_duration_ms: 15000   # > end_timeout, so it records the full 10s window
  description: record the sound-card input for ~10s (rx)

- type: log
  message: record-only complete
